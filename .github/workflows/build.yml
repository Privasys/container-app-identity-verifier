#
# Test, then build & push the identity-verifier image to GHCR. Each push of a
# `v*` tag produces ghcr.io/privasys/container-app-identity-verifier:<tag> and a
# :<tag>-<sha> immutable tag (linux/amd64 — the confidential enclave is amd64; a
# multi-arch index would change the digest the platform pins at OID 3.2).

name: Build & Push identity-verifier

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/privasys/container-app-identity-verifier

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Embed privasys.json (tools + config_api) plus the App Store listing as the
      # org.privasys.manifest OCI label, so the management-service auto-detects the
      # tools (API Testing) and pre-fills the App Store listing for this package
      # app. The "store" block maps store/listing.json into the ingestion schema
      # (unprefixed field names); listing.json stays the single source of truth.
      # The manifest is written to a file (not a label: input) because the action's
      # labels: list is CSV-parsed and strips the quotes inside the JSON; we pass it
      # to `docker buildx build --label` directly as a single argument instead.
      - name: Compose manifest label
        run: |
          # Base map: store/listing.json -> manifest "store" block.
          jq -c '. + {store: (input | {
            tagline: .store_tagline,
            description: .store_description,
            category: .store_category,
            keywords: .store_keywords,
            icon_url: .store_icon_url,
            screenshots: .store_screenshots,
            website_url: .store_website_url,
            support_email: .store_support_email,
            privacy_url: .store_privacy_url,
            tos_url: .store_tos_url
          })}' privasys.json store/listing.json > manifest.base.json

          # Embed the referenced store assets (icon + screenshots) as base64, keyed
          # by filename, so the platform imports them into portal storage (the asset
          # bucket) instead of hotlinking an external website.
          files=$(jq -r '([.store_icon_url] + (.store_screenshots // []))[]' store/listing.json)
          assets='{}'
          for f in $files; do
            if [ -f "store/$f" ]; then
              b64=$(base64 -w0 "store/$f")
              assets=$(printf '%s' "$assets" | jq -c --arg k "$f" --arg v "$b64" '. + {($k): $v}')
            fi
          done
          jq -c --argjson assets "$assets" '.store.assets = $assets' manifest.base.json > manifest.label.json

      - name: Build and push
        run: |
          MANIFEST="$(cat manifest.label.json)"
          TAG="${{ steps.tag.outputs.tag }}"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --label "org.privasys.manifest=${MANIFEST}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:${TAG}-${GITHUB_SHA}" \
            --push .

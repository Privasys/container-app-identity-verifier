#
# Test on every push/PR; publish + release ONLY on a `v*` git tag.
#
# Platform contract (management-service):
#   - A deployable "version" == a TAG on the GHCR image (ListImageTags reads
#     registry tags). We publish exactly ONE semver tag per git tag -> no
#     tag, no image. The old :<tag>-<sha> variant is dropped: mgmt filters it
#     out of the picker and the release below records the digest anyway.
#   - Single-arch linux/amd64 + --provenance=false: an OCI attestation index
#     would change the digest the enclave pins at OID 1.3.6.1.4.1.65230.3.2.
#   - Each release records that digest (Measurements table) and cosign-signs
#     it, so git tag <-> image digest <-> commit is auditable.

name: Build and Release identity-verifier

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/privasys/container-app-identity-verifier

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q

  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write      # cut the GitHub Release
      packages: write      # push to GHCR
      id-token: write       # cosign keyless (Fulcio/Rekor OIDC)
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Embed privasys.json (tools + config_api) plus the App Store listing as the
      # org.privasys.manifest OCI label, so the management-service auto-detects the
      # tools (API Testing) and pre-fills the App Store listing for this package
      # app. The "store" block maps store/listing.json into the ingestion schema
      # (unprefixed field names); listing.json stays the single source of truth.
      - name: Compose manifest label
        run: |
          # Base map: store/listing.json -> manifest "store" block.
          jq -c '. + {store: (input | {
            tagline: .store_tagline,
            description: .store_description,
            category: .store_category,
            keywords: .store_keywords,
            icon_url: .store_icon_url,
            screenshots: .store_screenshots,
            website_url: .store_website_url,
            support_email: .store_support_email,
            privacy_url: .store_privacy_url,
            tos_url: .store_tos_url
          })}' privasys.json store/listing.json > manifest.base.json

          # Embed the referenced store assets (icon + screenshots) as base64, keyed
          # by filename, so the platform imports them into portal storage (the asset
          # bucket) instead of hotlinking an external website.
          files=$(jq -r '([.store_icon_url] + (.store_screenshots // []))[]' store/listing.json)
          assets='{}'
          for f in $files; do
            if [ -f "store/$f" ]; then
              b64=$(base64 -w0 "store/$f")
              assets=$(printf '%s' "$assets" | jq -c --arg k "$f" --arg v "$b64" '. + {($k): $v}')
            fi
          done
          jq -c --argjson assets "$assets" '.store.assets = $assets' manifest.base.json > manifest.label.json

      # Raw buildx (not build-push-action) because the manifest label carries
      # embedded JSON the action's CSV label parser would mangle; --label passes
      # it as a single argument. --metadata-file captures the pushed digest.
      - name: Build and push
        id: build
        run: |
          MANIFEST="$(cat manifest.label.json)"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --label "org.privasys.manifest=${MANIFEST}" \
            --metadata-file metadata.json \
            -t "${IMAGE}:${{ steps.tag.outputs.tag }}" \
            --push .
          echo "digest=$(jq -r '."containerimage.digest"' metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Cut GitHub Release (Measurements)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAG: ${{ steps.tag.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          cat > notes.md <<EOF
          ## Measurements

          | Measurement | Value |
          |-------------|-------|
          | **Workload image digest** | \`${DIGEST}\` |
          | **Attestation OID** | \`1.3.6.1.4.1.65230.3.2\` |
          | **Pinned reference** | \`${IMAGE}@${DIGEST}\` |
          | **Source commit** | \`${SHA}\` |

          The workload image digest is the SHA-256 manifest digest of the published
          container image. The enclave measures it into the RA-TLS leaf certificate
          at OID **1.3.6.1.4.1.65230.3.2**; clients verify the running app is exactly
          this image by inspecting the TDX quote in the server certificate. The image
          is cosign-signed (keyless, Fulcio/Rekor) against the same digest.
          EOF
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file notes.md --generate-notes --verify-tag
          fi

      - name: Summary
        run: |
          {
            echo "## ${{ steps.tag.outputs.tag }} published"
            echo
            echo '```'
            echo "${IMAGE}@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
